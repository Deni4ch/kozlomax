<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KozloMax</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 100%); color: white; height: 100vh; overflow: hidden; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148,163,184,0.15); }
    .chat-bubble { max-width: 78%; padding: 14px 20px; border-radius: 22px; animation: bubble 0.4s ease; }
    .chat-bubble.sent { background: linear-gradient(135deg, #00ff9d, #00cc7a); color: #0a0a0a; border-bottom-right-radius: 6px; margin-left: auto; }
    .chat-bubble.received { background: rgba(255,255,255,0.08); border-bottom-left-radius: 6px; }
    @keyframes bubble { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .time { font-size: 10px; opacity: 0.65; margin-top: 4px; text-align: right; }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <!-- SPLASH -->
  <div id="splash" class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-[#0a0a0a] to-[#0f172a] z-50">
    <div class="text-center">
      <div class="w-28 h-28 mx-auto bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-6xl mb-6">🐐</div>
      <h1 class="text-6xl font-bold tracking-tighter">KozloMax</h1>
      <p class="text-emerald-400 text-xl">чат для своих</p>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="hidden w-full max-w-md glass rounded-3xl p-8">
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-4xl">🐐</div>
        <h1 class="text-4xl font-bold">KozloMax</h1>
      </div>
    </div>

    <div class="flex bg-gray-900 rounded-2xl p-1 mb-8">
      <button onclick="switchTab(0)" id="tabLogin" class="flex-1 py-3 rounded-xl font-semibold bg-white/10">Вход</button>
      <button onclick="switchTab(1)" id="tabRegister" class="flex-1 py-3 rounded-xl font-semibold">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <input id="loginEmail" type="email" placeholder="Почта" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-4">
      <input id="loginPass" type="password" placeholder="Пароль" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-6">
      <button onclick="login()" class="w-full py-5 bg-gradient-to-r from-[#00ff9d] to-[#00cc7a] text-black font-bold text-xl rounded-3xl">Войти</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
      <input id="regEmail" type="email" placeholder="Почта" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-4">
      <input id="regPass" type="password" placeholder="Пароль (минимум 6)" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-6">
      <button onclick="register()" class="w-full py-5 bg-gradient-to-r from-[#00ff9d] to-[#00cc7a] text-black font-bold text-xl rounded-3xl">Создать аккаунт</button>
    </div>
  </div>

  <!-- PROFILE SETUP -->
  <div id="profileScreen" class="hidden w-full max-w-md glass rounded-3xl p-8">
    <h2 class="text-3xl font-bold text-center mb-8">Заверши профиль</h2>
    <input id="profileName" placeholder="Имя (обязательно)" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-4">
    <input id="profileSurname" placeholder="Фамилия (по желанию)" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-4">
    <input id="profileAge" type="number" placeholder="Возраст (по желанию)" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 mb-6">
    <button onclick="saveProfile()" class="w-full py-5 bg-gradient-to-r from-[#00ff9d] to-[#00cc7a] text-black font-bold text-xl rounded-3xl">Готово → в чат</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="hidden w-full max-w-4xl h-screen flex flex-col glass">
    <div class="p-6 flex items-center justify-between border-b border-white/10">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-3xl">🐐</div>
        <div>
          <h1 class="text-3xl font-bold">KozloMax</h1>
          <p class="text-emerald-400 text-sm">чат для своих</p>
        </div>
      </div>
      <div onclick="logout()" class="cursor-pointer text-3xl">🚪</div>
    </div>
    <div class="flex-1 p-6 overflow-y-auto">
      <h2 class="text-xl font-semibold mb-4">Общий чат</h2>
      <div onclick="openChat('global')" class="glass rounded-3xl p-6 flex gap-5 cursor-pointer mb-8">
        <div class="w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center text-5xl">🌍</div>
        <div class="flex-1">
          <div class="font-bold text-2xl">Общий Direct Messages</div>
          <div class="text-emerald-400">Все сообщения сохранены</div>
        </div>
      </div>

      <h2 class="text-xl font-semibold mb-4">Пользователи (DM)</h2>
      <div id="usersList" class="space-y-3"></div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen" class="hidden w-full max-w-4xl h-screen flex flex-col glass">
    <div class="p-6 flex items-center gap-4 border-b border-white/10">
      <button onclick="backToDashboard()" class="text-3xl">←</button>
      <div id="chatTitle" class="font-bold text-2xl"></div>
    </div>
    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[#0a0a0a]"></div>
    <div class="p-5 glass">
      <div class="flex gap-3 bg-[#1e2937] rounded-3xl px-6 py-3">
        <input id="messageInput" onkeypress="if(event.key==='Enter') sendMessage()" class="flex-1 bg-transparent text-lg focus:outline-none" placeholder="Напиши сообщение...">
        <button onclick="sendMessage()" class="w-12 h-12 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl text-3xl text-black">↑</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let token = localStorage.getItem('token');
    let currentEmail = '';
    let currentName = '';
    let currentRoom = 'global';
    let socket = null;

    function showScreen(id) {
      document.querySelectorAll('#authScreen, #profileScreen, #dashboardScreen, #chatScreen').forEach(el => el.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab === 1);
      document.getElementById('registerForm').classList.toggle('hidden', tab === 0);
      document.getElementById('tabLogin').classList.toggle('bg-white/10', tab === 0);
      document.getElementById('tabRegister').classList.toggle('bg-white/10', tab === 1);
    }

    async function register() {
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      if (pass.length < 6) return alert('Пароль минимум 6 символов');
      const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password: pass}) });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('token', data.token);
        token = data.token;
        currentEmail = data.email;
        showScreen('profileScreen');
      } else alert(data.error);
    }

    async function saveProfile() {
      const name = document.getElementById('profileName').value.trim();
      if (!name) return alert('Имя обязательно!');
      const surname = document.getElementById('profileSurname').value.trim();
      const age = document.getElementById('profileAge').value;
      await fetch('/api/update-profile', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({token, name, surname, age}) });
      currentName = name;
      loadDashboard();
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password: pass}) });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        token = data.token;
        currentEmail = data.email;
        currentName = data.name;
        loadDashboard();
      } else alert(data.error);
    }

    async function loadDashboard() {
      showScreen('dashboardScreen');
      // Загружаем пользователей для DM
      const res = await fetch('/api/users');
      const users = await res.json();
      const list = document.getElementById('usersList');
      list.innerHTML = '';
      users.forEach(user => {
        if (user.email === currentEmail) return;
        const div = document.createElement('div');
        div.className = 'glass rounded-3xl p-5 flex items-center gap-4 cursor-pointer hover:scale-105';
        div.innerHTML = `<div class="flex-1"><div class="font-semibold">${user.name || user.email}</div></div>`;
        div.onclick = () => openChat(`dm_${[currentEmail, user.email].sort().join('_')}`, user.name || user.email);
        list.appendChild(div);
      });
    }

    async function openChat(room, title = 'Общий Direct Messages') {
      currentRoom = room;
      document.getElementById('chatTitle').innerText = title;
      showScreen('chatScreen');

      // Подключаемся к комнате
      if (!socket) {
        socket = io();
        socket.on('chat message', addMessage);
      }
      socket.emit('join room', room);

      // Загружаем историю
      const res = await fetch(`/api/messages/${room}`);
      const history = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      history.forEach(msg => addMessage(msg));
    }

    function addMessage(msg) {
      const container = document.getElementById('messages');
      const isMine = msg.email === currentEmail;
      const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
      const div = document.createElement('div');
      div.className = `flex ${isMine ? 'justify-end' : 'justify-start'} mb-4`;
      div.innerHTML = `
        <div class="${isMine ? 'chat-bubble sent' : 'chat-bubble received'}">
          <div class="text-xs opacity-70">${msg.name || msg.email}</div>
          <div>${msg.text}</div>
          <div class="time">${time}</div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim() || !socket) return;
      const data = {
        room: currentRoom,
        email: currentEmail,
        name: currentName,
        text: input.value.trim()
      };
      socket.emit('chat message', data);
      input.value = '';
    }

    function backToDashboard() {
      showScreen('dashboardScreen');
    }

    function logout() {
      localStorage.clear();
      location.reload();
    }

    async function checkAuth() {
      if (!token) {
        setTimeout(() => { document.getElementById('splash').classList.add('hidden'); showScreen('authScreen'); }, 1400);
        return;
      }
      const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        currentEmail = data.email;
        currentName = data.name || data.email;
        document.getElementById('splash').classList.add('hidden');
        loadDashboard();
      } else {
        localStorage.clear();
        document.getElementById('splash').classList.add('hidden');
        showScreen('authScreen');
      }
    }

    window.onload = checkAuth;
  </script>
</body>
</html>
