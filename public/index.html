<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KozloMax</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; background: #0f0f0f; color: white; }
    #messages { height: 70vh; overflow-y: scroll; border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #1a1a1a; }
    .msg { margin: 8px 0; padding: 8px; border-radius: 8px; max-width: 80%; }
    .msg.me { background: #0066ff; align-self: flex-end; margin-left: auto; }
    input { padding: 12px; width: 70%; font-size: 16px; }
    button { padding: 12px 20px; background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🐐 KozloMax</h1>
  
  <input id="username" placeholder="Твоё имя" value="Гость">
  <button onclick="startChat()">Войти в чат</button>

  <div id="chat" style="display:none;">
    <div id="messages"></div>
    <input id="message" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Отправить</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket, username;
    
    function startChat() {
      username = document.getElementById('username').value || 'Аноним';
      document.getElementById('chat').style.display = 'block';
      socket = io();
      
      socket.on('chat message', (data) => {
        const div = document.createElement('div');
        div.className = 'msg ' + (data.user === username ? 'me' : '');
        div.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView();
      });
    }
    
    function sendMessage() {
      const input = document.getElementById('message');
      if (!input.value) return;
      
      socket.emit('chat message', {
        user: username,
        text: input.value
      });
      input.value = '';
    }
  </script>
</body>
</html>
