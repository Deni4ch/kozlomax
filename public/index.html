<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KozloMax</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 100%);
      color: white;
      overflow: hidden;
      height: 100vh;
    }
    
    .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(24px); border: 1px solid rgba(148, 163, 184, 0.15); }
    .neon { text-shadow: 0 0 30px #00ff9d, 0 0 60px #00ff9d; }
    
    .chat-bubble {
      max-width: 78%;
      padding: 14px 20px;
      border-radius: 22px;
      position: relative;
      animation: bubbleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .chat-bubble.sent {
      background: linear-gradient(135deg, #00ff9d, #00cc7a);
      color: #0a0a0a;
      border-bottom-right-radius: 6px;
      margin-left: auto;
    }
    .chat-bubble.received {
      background: rgba(255,255,255,0.08);
      border-bottom-left-radius: 6px;
    }
    @keyframes bubbleIn {
      0% { transform: scale(0.6) translateY(30px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    
    .time { font-size: 10px; opacity: 0.6; margin-top: 3px; }
    
    .input-focus:focus {
      box-shadow: 0 0 0 4px rgba(0, 255, 157, 0.3);
      border-color: #00ff9d;
    }
    
    .screen { animation: fadeUp 0.5s ease forwards; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <!-- SPLASH -->
  <div id="splash" class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-[#0a0a0a] to-[#0f172a] z-50">
    <div class="text-center">
      <div class="w-28 h-28 mx-auto bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-6xl shadow-[0_0_80px_#00ff9d] mb-6">🐐</div>
      <h1 class="text-6xl font-bold tracking-tighter neon">KozloMax</h1>
      <p class="text-xl text-emerald-400 mt-2">чат для своих</p>
    </div>
  </div>

  <!-- AUTH -->
  <div id="authScreen" class="hidden w-full max-w-md screen glass rounded-3xl p-8">
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-4xl">🐐</div>
        <h1 class="text-4xl font-bold tracking-tighter">KozloMax</h1>
      </div>
    </div>
    <div class="space-y-6">
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-400 mb-2 block">ПОЧТА</label>
        <input id="regEmail" type="email" placeholder="kozlo@max.ru" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 text-lg">
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-400 mb-2 block">ПАРОЛЬ (минимум 6)</label>
        <input id="regPass" type="password" placeholder="••••••••" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 text-lg">
        <p id="passError" class="text-red-500 text-xs mt-1 hidden">Пароль должен быть минимум 6 символов</p>
      </div>
      <button onclick="register()" class="w-full py-5 bg-gradient-to-r from-[#00ff9d] to-[#00cc7a] text-black font-bold text-xl rounded-3xl hover:brightness-110">Создать аккаунт</button>
    </div>
  </div>

  <!-- PROFILE SETUP (после регистрации) -->
  <div id="profileScreen" class="hidden w-full max-w-md screen glass rounded-3xl p-8">
    <h2 class="text-3xl font-bold text-center mb-8">Заверши профиль</h2>
    <div class="space-y-6">
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-400 mb-2 block">ИМЯ (обязательно)</label>
        <input id="profileName" placeholder="Козёл Максим" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 text-lg">
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-400 mb-2 block">ФАМИЛИЯ (по желанию)</label>
        <input id="profileSurname" placeholder="Козлов" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 text-lg">
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-gray-400 mb-2 block">ВОЗРАСТ (по желанию)</label>
        <input id="profileAge" type="number" placeholder="18" class="w-full glass border border-slate-700 focus:border-[#00ff9d] rounded-3xl px-6 py-5 text-lg">
      </div>
      <button onclick="saveProfile()" class="w-full py-5 bg-gradient-to-r from-[#00ff9d] to-[#00cc7a] text-black font-bold text-xl rounded-3xl">Готово → в чат</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="hidden w-full max-w-4xl h-screen flex flex-col screen">
    <div class="glass px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl flex items-center justify-center text-3xl">🐐</div>
        <div>
          <h1 class="text-3xl font-bold tracking-tighter">KozloMax</h1>
          <p class="text-emerald-400 text-sm">чат для своих</p>
        </div>
      </div>
      <div onclick="logout()" class="cursor-pointer text-2xl">🚪</div>
    </div>
    <div class="flex-1 p-6">
      <div onclick="openChat()" class="glass rounded-3xl p-6 flex gap-5 items-center cursor-pointer hover:scale-[1.02]">
        <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-3xl flex items-center justify-center text-5xl">🌍</div>
        <div class="flex-1">
          <div class="text-2xl font-semibold">Общий Direct Messages</div>
          <div class="text-emerald-400">Все козлы онлайн • 100% история сохранена</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="hidden w-full max-w-4xl h-screen flex flex-col screen">
    <div class="glass px-6 py-5 flex items-center gap-4 border-b border-white/10">
      <button onclick="backToDashboard()" class="text-3xl">←</button>
      <div>
        <div class="font-bold text-2xl">Общий Direct Messages</div>
        <div class="flex items-center gap-2 text-emerald-400 text-sm"><span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> LIVE • история сохранена</div>
      </div>
    </div>
    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-7 bg-[#0a0a0a]"></div>
    <div class="glass p-5">
      <div class="flex gap-3 bg-[#1e2937] rounded-3xl px-6 py-3">
        <input id="messageInput" onkeypress="if(event.key==='Enter') sendMessage()" 
               class="flex-1 bg-transparent text-lg focus:outline-none input-focus" placeholder="Напиши козлам...">
        <button onclick="sendMessage()" class="w-12 h-12 bg-gradient-to-br from-[#00ff9d] to-[#00cc7a] rounded-3xl text-3xl text-black">↑</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let token = localStorage.getItem('token');
    let currentEmail = '';
    let currentName = 'Козёл';
    let socket = null;

    async function register() {
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;
      const err = document.getElementById('passError');
      
      if (pass.length < 6) {
        err.classList.remove('hidden');
        return;
      }
      err.classList.add('hidden');

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password: pass})
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('token', data.token);
        token = data.token;
        currentEmail = data.email;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('profileScreen').classList.remove('hidden');
      } else alert(data.error);
    }

    async function saveProfile() {
      const name = document.getElementById('profileName').value.trim();
      const surname = document.getElementById('profileSurname').value.trim();
      const age = document.getElementById('profileAge').value;
      
      if (!name) return alert('Имя обязательно!');

      await fetch('/api/update-profile', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token, name, surname, age})
      });
      
      currentName = name;
      loadDashboard();
    }

    async function checkAuth() {
      if (!token) {
        setTimeout(() => {
          document.getElementById('splash').classList.add('hidden');
          document.getElementById('authScreen').classList.remove('hidden');
        }, 1400);
        return;
      }
      // ... (логика загрузки как раньше)
      loadDashboard();
    }

    function loadDashboard() {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('profileScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.remove('hidden');
    }

    async function openChat() {
      document.getElementById('dashboardScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');

      // Загружаем историю
      const res = await fetch('/api/messages');
      const history = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      history.forEach(msg => {
        addMessage(msg.name || msg.email, msg.text, msg.timestamp);
      });

      if (!socket) {
        socket = io();
        socket.on('chat message', (data) => addMessage(data.name || data.email, data.text, new Date()));
      }
    }

    function addMessage(user, text, ts) {
      const container = document.getElementById('messages');
      const time = new Date(ts).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
      const div = document.createElement('div');
      div.className = `flex ${user === currentName ? 'justify-end' : 'justify-start'} mb-4`;
      div.innerHTML = `
        <div class="${user === currentName ? 'chat-bubble sent' : 'chat-bubble received'}">
          <div class="text-xs opacity-70">${user}</div>
          <div>${text}</div>
          <div class="time text-right">${time}</div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim() || !socket) return;
      
      const msgData = {
        email: currentEmail,
        name: currentName,
        text: input.value.trim()
      };
      socket.emit('chat message', msgData);
      input.value = '';
    }

    function backToDashboard() { location.reload(); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = checkAuth;
  </script>
</body>
</html>
